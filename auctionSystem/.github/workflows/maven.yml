name: Java CI with Maven

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build and Run Checkstyle
      run: mvn clean validate

    - name: Run Tests
      run: mvn test

    - name: Run Checkstyle Report
      if: always()
      run: mvn checkstyle:checkstyle
